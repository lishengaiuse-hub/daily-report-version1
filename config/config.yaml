# =====================================================
# Samsung CE Intelligence System - Complete Configuration
# Version: 3.1
# Updated: 2026-04-19
# Includes: Google News RSS (primary), RSS, Web Scraping, Firecrawl, API sources
# =====================================================

system:
  name: "Samsung CE Intelligence"
  timezone: "Asia/Singapore"
  run_hour: 7
  run_minute: 30
  max_articles_per_source: 30
  days_to_look_back: 3

# =====================================================
# DATA SOURCES
# =====================================================

sources:
  # ========== GOOGLE NEWS RSS (Priority 0 — always reachable from CI) ==========
  # These run BEFORE individual RSS feeds and reliably capture fresh news.
  # Format: query (English) + query_zh (Chinese), up to 20 results each.
  google_news_rss:
    en:
      # T1 — Competitor dynamics
      - query: "apple xiaomi huawei smartphone launch release when:30d"
        label: "T1-竞品-手机-EN"
      - query: "LG sony TCL hisense TV OLED launch price when:30d"
        label: "T1-竞品-家电-EN"
      - query: "apple xiaomi qualcomm snapdragon chip processor release when:30d"
        label: "T1-竞品-芯片-EN"
      - query: "oppo vivo honor samsung display panel launch when:30d"
        label: "T1-竞品-显示-EN"
      - query: "huawei oppo vivo foldable phone flagship release when:30d"
        label: "T1-竞品-折叠-EN"
      # T2 — Technology / Materials
      - query: "MicroLED MiniLED OLED display technology breakthrough when:30d"
        label: "T2-显示技术-EN"
      - query: "semiconductor wafer foundry TSMC process node when:30d"
        label: "T2-半导体-EN"
      - query: "solid state battery silicon anode energy density when:30d"
        label: "T2-电池-EN"
      - query: "GaN graphene perovskite material electronics when:30d"
        label: "T2-材料-EN"
      - query: "on-device AI NPU edge inference chip when:30d"
        label: "T2-AI芯片-EN"
      - query: "DRAM HBM memory chip Samsung SK Hynix Micron when:30d"
        label: "T2-内存芯片-EN"
      # ── T1: SEA制造扩产（11条专项查询，均加 when:30d 强制近期新闻）────
      # 注：T1/T2制造新闻频率低（周级别），when:30d确保搜索最近7天内容
      - query: "foxconn apple samsung electronics expand capacity vietnam india when:30d"
        label: "T1-代工扩产-EN"
      - query: "vietnam electronics factory expand scale up production smartphone appliance when:30d"
        label: "T1-越南扩产-EN"
      - query: "india electronics manufacturing expand increase capacity apple foxconn when:30d"
        label: "T1-印度扩产-EN"
      - query: "thailand electronics factory smartphone home appliance expand capacity when:30d"
        label: "T1-泰国扩产-EN"
      - query: "malaysia penang electronics manufacturing factory expand capacity smartphone when:30d"
        label: "T1-马来西亚扩产-EN"
      - query: "indonesia electronics factory smartphone home appliance expand production when:30d"
        label: "T1-印尼扩产-EN"
      - query: "singapore electronics manufacturing expand capacity consumer electronics when:30d"
        label: "T1-新加坡扩产-EN"
      - query: "site:india-briefing.com electronics factory expand investment production when:30d"
        label: "T1-IndiaBriefing扩产-EN"
      - query: "site:vietnam-briefing.com electronics factory expand scale investment when:30d"
        label: "T1-VietnamBriefing扩产-EN"
      - query: "site:thailand-briefing.com electronics factory expand smartphone appliance when:30d"
        label: "T1-ThailandBriefing扩产-EN"
      - query: "southeast asia electronics factory expand capacity investment when:30d"
        label: "T1-SEA扩产通用-EN"
      # ── T2: SEA新建工厂（10条专项查询，均加 when:30d）──────────────
      - query: "new electronics factory build vietnam india greenfield plant construct when:30d"
        label: "T2-新建厂-EN"
      - query: "apple foxconn new factory india vietnam construction groundbreaking when:30d"
        label: "T2-新建厂-苹果富士康-EN"
      - query: "samsung LG new manufacturing plant southeast asia build invest when:30d"
        label: "T2-新建厂-Samsung-LG-EN"
      - query: "thailand new electronics factory smartphone home appliance plant build when:30d"
        label: "T2-泰国新建厂-EN"
      - query: "malaysia new electronics factory smartphone home appliance greenfield when:30d"
        label: "T2-马来西亚新建厂-EN"
      - query: "indonesia new electronics factory consumer electronics plant construct when:30d"
        label: "T2-印尼新建厂-EN"
      - query: "site:india-briefing.com new factory plant build construction electronics"
        label: "T2-IndiaBriefing新厂-EN"
      - query: "site:vietnam-briefing.com new factory plant construction electronics"
        label: "T2-VietnamBriefing新厂-EN"
      - query: "site:thailand-briefing.com new factory plant construction electronics"
        label: "T2-ThailandBriefing新厂-EN"
      - query: "consumer electronics new plant greenfield southeast asia indonesia thailand malaysia when:30d"
        label: "T2-SEA四国新建厂-EN"
      # 宽泛搜索（让分类器过滤CE相关）
      - query: "electronics manufacturing investment southeast asia factory when:30d"
        label: "T1-SEA制造通用-EN"
      - query: "smartphone home appliance factory investment vietnam india thailand malaysia when:30d"
        label: "T1-手机家电工厂-EN"
      # ── T4: 新技术/材料（12条专项查询）────────────────────────────────
      # 显示技术（技术本身，非供应链）
      - query: "MicroLED MiniLED OLED display technology smartphone TV breakthrough when:30d"
        label: "T4-显示技术-EN"
      - query: "site:oled-info.com display technology adoption smartphone 2026"
        label: "T4-OLEDinfo-EN"
      - query: "site:microled-info.com display technology TV smartphone 2026"
        label: "T4-MicroLEDinfo-EN"
      # 固态电池/新型电池
      - query: "solid state battery silicon anode consumer electronics phone TV"
        label: "T4-固态电池-EN"
      - query: "new battery technology smartphone home appliance energy density"
        label: "T4-电池技术-EN"
      # 新型散热材料（手机/家电专项）
      - query: "thermal interface material graphene vapor chamber smartphone phone cooling"
        label: "T4-散热材料手机-EN"
      - query: "new thermal material heat dissipation home appliance phone boron nitride"
        label: "T4-散热材料家电-EN"
      - query: "liquid metal cooling graphene thermal film consumer electronics smartphone"
        label: "T4-新型散热-EN"
      - query: "carbon fiber thermal pad phase change material phone appliance heat management"
        label: "T4-散热材料CE-EN"
      # 复合材料（手机/家电机身）
      - query: "carbon fiber composite smartphone phone chassis casing lightweight material"
        label: "T4-碳纤维手机-EN"
      - query: "titanium alloy composite magnesium alloy phone home appliance casing"
        label: "T4-金属复合材料-EN"
      - query: "new composite material ceramic smartphone body consumer electronics"
        label: "T4-复合材料CE-EN"
      # Market research
      - query: "smartphone market share shipment IDC forecast"
        label: "T3-市场份额-EN"
      - query: "japan electronics sony panasonic sharp nikkei when:30d"
        label: "T3-日本CE-EN"
      # Site-specific: moneydj / eastmoney / eet-china / technews (Google News proxy)
      - query: "moneydj 電子 半導體 消費電子 製造 when:30d"
        label: "T3-MoneyDJ-TW"
      - query: "eastmoney 消费电子 手机 家电 制造 when:30d"
        label: "T3-EastMoney-CN"
      - query: "eet-china 消费电子 元器件 制造 when:30d"
        label: "T4-EETchina-CN"
    zh:
      # T1 — 竞品动态
      - query: "小米华为OPPO vivo手机发布上市2025"
        label: "T1-竞品-手机-ZH"
      - query: "海信TCL格力美的电视家电发布价格 when:30d"
        label: "T1-竞品-家电-ZH"
      - query: "苹果华为芯片处理器发布 when:30d"
        label: "T1-竞品-芯片-ZH"
      - query: "荣耀小米折叠屏手机发布旗舰 when:30d"
        label: "T1-竞品-折叠-ZH"
      # T2 — 新技术材料
      - query: "MicroLED MiniLED OLED显示技术突破 when:30d"
        label: "T2-显示-ZH"
      - query: "半导体晶圆制程芯片台积电 when:30d"
        label: "T2-半导体-ZH"
      - query: "固态电池材料氮化镓石墨烯 when:30d"
        label: "T2-材料-ZH"
      - query: "HBM存储芯片三星海力士美光 when:30d"
        label: "T2-内存-ZH"
      # T1 — 东南亚扩产（ZH，加 when:30d）
      - query: "越南印度泰国马来西亚印尼手机家电工厂扩产产能增加 when:30d"
        label: "T1-东南亚四国扩产-ZH"
      - query: "富士康苹果越南泰国马来西亚工厂扩大产能追加投资 when:30d"
        label: "T1-代工扩产-ZH"
      - query: "东南亚手机家电制造工厂扩产投资增加产能 when:30d"
        label: "T1-SEA扩产-ZH"
      # T2 — 东南亚新建工厂（ZH，加 when:30d）
      - query: "泰国马来西亚印尼越南新建工厂消费电子手机家电建厂 when:30d"
        label: "T2-SEA新建厂-ZH"
      - query: "苹果富士康三星越南印度建厂新工厂投资 when:30d"
        label: "T2-供应商建厂-ZH"
      # T4 — 新技术材料（ZH）
      - query: "MicroLED MiniLED OLED显示技术手机电视突破应用2026 when:30d"
        label: "T4-显示技术-ZH"
      - query: "固态电池硅负极消费电子手机家电量产应用2026"
        label: "T4-固态电池-ZH"
      - query: "新型散热材料石墨烯均热板手机家电散热2026"
        label: "T4-散热材料-ZH"
      - query: "导热材料氮化硼液态金属散热手机消费电子应用2026"
        label: "T4-导热材料-ZH"
      - query: "碳纤维复合材料手机机身壳体轻量化消费电子2026"
        label: "T4-碳纤维复合-ZH"
      - query: "复合材料钛合金镁合金手机家电机身新材料2026"
        label: "T4-金属复合材料-ZH"

  # ========== RSS FEEDS (Priority 1) ==========
  # Note: Only sources verified to work from GitHub Actions CI are kept.
  # Sources with consistent DNS failures or IP blocks have been removed.
  rss:
    # 显示技术 / Display Technology
    display:
      - "https://www.oled-info.com/rss.xml"
      - "https://www.microled-info.com/rss.xml"
      - "https://www.displaydaily.com/rss"
      - "https://www.ledinside.cn/rss.xml"
      - "https://www.ledinside.com/rss.xml"           # LedInside English — T4 display tech
      # digitimes removed — primarily covers display panel supply chain/pricing (not T4)
      # displaysupplychain.com removed — consistently fails in CI

    # 半导体 / Semiconductor
    semiconductor:
      - "https://semiengineering.com/feed/"
      - "https://www.semiwiki.com/feed/"
      - "https://www.eetimes.com/feed/"
      - "https://www.electronicsweekly.com/feed/"
      - "https://www.semiconductor-digest.com/feed/"
      - "https://www.electronicdesign.com/rss.xml"
      # semiconductor-today.com and evertiq.com removed — consistently fail in CI

    # 消费电子 / Consumer Electronics
    consumer_electronics:
      - "https://www.theverge.com/rss/index.xml"
      - "https://techcrunch.com/feed/"
      - "https://www.engadget.com/rss.xml"
      - "https://www.cnet.com/rss/news/"
      - "https://9to5google.com/feed/"
      - "https://9to5mac.com/feed/"
      - "https://www.androidpolice.com/feed/"
      # phonearena.com removed — CI IP blocked (covered by Google News RSS)
      # gsmarena.com removed — CI IP blocked

    # 中文科技媒体 / Chinese Tech Media
    chinese_tech:
      - "https://www.ithome.com/rss/"
      - "https://www.36kr.com/feed"
      - "https://www.leiphone.com/feed"
      - "https://technews.tw/feed/"
      - "https://www.eepw.com.cn/rss"
      # eet-china.com removed — consistently times out in CI (60s wasted per run)
      # Covered by Google News RSS queries (T4-EETchina-CN)
      # moneydj/eastmoney: no public RSS — covered via Google News RSS queries above

    # 东南亚制造 / SEA Manufacturing
    sea_manufacturing:
      - "https://www.businesstimes.com.sg/rss.xml"
      - "https://www.channelnewsasia.com/api/v1/rss-outbound-feed?_format=xml"  # Fixed CNA URL
      # thelec.net removed — returns empty feed in CI
      # CNA old endpoint /rss/8395858 removed — was failing, replaced with API endpoint
      # Removed: vietnam-briefing (fails), thailand-briefing (DNS), thestar.my,
      # bangkokpost (premature end), vnexpress (fails), msia.org.my (fails)

    # 印度/SEA制造 / India & SEA Manufacturing
    india_manufacturing:
      - "https://www.moneycontrol.com/rss/economy.xml"
      - "https://economictimes.indiatimes.com/rssfeeds/1977021501.cms"
      - "https://www.electronicsforu.com/feed"        # India electronics manufacturing news
      # Original 4 sources all fail from CI — replaced with working alternatives

    # 供应链 / Supply Chain
    supply_chain:
      - "https://www.electronicdesign.com/rss.xml"
      - "https://www.supplychaindive.com/feeds/news/"   # Replaced supplychaindigital (fails) with working alternative
      # supplychainbrain, scmr, ebnonline, globalsmt, supplychaindigital all fail — removed

    # 新材料 / Materials & Battery
    materials_battery:
      - "https://www.electrochem.org/feed"
      - "https://www.advancedsciencenews.com/feed/"
      - "https://www.electropages.com/feed"
      - "https://www.idtechex.com/en/rss.asp"        # IDTechEx — battery/materials/display research
      - "https://www.sciencedaily.com/rss/matter_energy/materials_science.xml"  # ScienceDaily materials
      # materialstoday (connection refused), chemistryworld, azom, compositesworld removed

    # 机器人/智能家居 / Robotics & Smart Home
    robotics_smart_home:
      - "https://www.vacuumwars.com/feed/"
      - "https://roboticsbiz.com/feed/"

    # AR/VR/可穿戴 / AR/VR/Wearable
    ar_vr_wearable:
      - "https://www.microled-info.com/rss.xml"
      - "https://www.roadtovr.com/feed/"
      - "https://www.uploadvr.com/feed/"

    # 展会信息 / Exhibitions
    # Official exhibition RSS feeds all fail from CI — covered by Google News RSS instead
    exhibitions: []

    # 市场研究 / Market Research
    market_research:
      - "https://www.trendforce.com/news/feed"
      - "https://www.idc.com/feed"
      # counterpointresearch feed, gartner, omdia all fail — removed

    # 三星官方 / Samsung Official
    samsung_official:
      - "https://news.samsung.com/global/rss"
      - "https://developer.samsung.com/feed"

    # 元器件供应商 / Component Suppliers
    component_suppliers:
      - "https://www.electronicdesign.com/rss.xml"
      # electronicproducts.com removed — redirects to edn.com which DNS-fails in CI
      # murata, tdk, kyocera (DNS), rohm all fail from CI — removed

    # 日本产业新闻 / Japan Industry
    japan_industry:
      - "https://www.japanindustrynews.com/feed/"
      # asia.nikkei.com removed — consistently fails from CI
  
