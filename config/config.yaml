# =====================================================
# DEDUPLICATION CONFIGURATION
# =====================================================

deduplication:
  layers:
    url_hash:
      enabled: true
      ignore_params:
        - "utm_source"
        - "utm_medium"
        - "utm_campaign"
        - "ref"
        - "source"
        - "from"
        - "utm_content"
        - "utm_term"
    
    title:
      enabled: true
      threshold: 0.85  # 降低阈值，更容易检测重复
    
    semantic:
      enabled: false  # 禁用语义去重以加快速度
      threshold: 0.85
      model: "all-MiniLM-L6-v2"
  
  history_days: 7
  
  priority:
    prefer_longer_content: true
    prefer_earlier_date: true
    prefer_higher_reliability: true

