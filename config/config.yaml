      url: "https://www.leikeji.com/columns/articles/%E8%B5%84%E8%AE%AF"
      container: "article"
      title_selector: "h3 a"
      link_selector: "h3 a"
      date_selector: ".time"
      limit: 15
    
    # IT桔子
    itjuzi:
      url: "https://www.itjuzi.com/news"
