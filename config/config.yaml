      title_selector: ".title a"
      link_selector: ".title a"
      date_selector: ".time"
      limit: 10
    
    # 老杳吧
    laoyaoba:
      url: "https://www.laoyaoba.com/html/news/"
      container: ".news_list li"
      title_selector: "a"
      link_selector: "a"
      date_selector: ".time"
      limit: 10
  
