      - "https://www.tdk.com/en/news_center/feed"
      - "https://news.kyocera.com/rss"
      - "https://www.rohm.com/news"
    
    # 日本产业新闻 / Japan Industry
    japan_industry:
      - "https://www.japanindustrynews.com/feed/"
      - "https://asia.nikkei.com/rss"
  
  # ========== WEB SCRAPING (Priority 2) ==========
  web_scraping:
    # 艾邦笔电论坛
    abnotebook:
      url: "https://www.abnotebook.com"
      container: ".entry"
      title_selector: ".entry-title a"
      link_selector: ".entry-title a"
      date_selector: ".entry-date"
      limit: 15
    
    # 艾邦笔电 - 越南板块
    abnotebook_vietnam:
      url: "https://www.abnotebook.com/a/category/vietnam"
      container: ".entry"
      title_selector: ".entry-title a"
      link_selector: ".entry-title a"
      date_selector: ".entry-date"
      limit: 10
    
    # 艾邦笔电 - 市场数据
    abnotebook_market:
      url: "https://www.abnotebook.com/a/category/market-data"
      container: ".entry"
      title_selector: ".entry-title a"
      link_selector: ".entry-title a"
      date_selector: ".entry-date"
      limit: 10
    
    # 中国粉体网
    cnpowder:
      url: "https://www.cnpowder.com.cn/news/subject.php"
      container: "div.news-item"
      title_selector: "div.news-item a"
      link_selector: "div.news-item a"
      date_selector: "div.news-item span.date"
      limit: 20
    
    # 艾邦VR/AR
    abvr360:
      url: "https://www.abvr360.com/a/category/technology"
      container: ".post-item"
      title_selector: ".post-title a"
      link_selector: ".post-title a"
      date_selector: ".post-date"
      limit: 15
    
    # 艾邦机器人
    aibangbots:
      url: "https://www.aibangbots.com/a/category/material"
      container: ".entry"
      title_selector: ".entry-title a"
      link_selector: ".entry-title a"
      date_selector: ".entry-date"
      limit: 10
    
    # 雷科技 (备用 - 主抓取使用 Firecrawl)
