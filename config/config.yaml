      - "https://www.counterpointresearch.com/feed/"
      - "https://www.idc.com/rss"
      - "https://www.gartner.com/rss"
      - "https://www.omdia.com/rss"
    
    # 三星官方 / Samsung Official
    samsung_official:
      - "https://news.samsung.com/global/rss"
      - "https://developer.samsung.com/rss"
    
    # 元器件供应商 / Component Suppliers
    component_suppliers:
