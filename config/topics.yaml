# Topic Classification Configuration for Samsung CE Intelligence
# Version: 3.0 - T1-T4严格分类（移除T5，强化相关性规则）

topics:
  1:
    name: "竞品动态 — Competitor Technology & Product Moves"
    description: "竞品品牌的产品发布、技术宣布、价格调整等竞争动态"
    required:
      brands:
        - "Apple / 苹果"
        - "Xiaomi / 小米"
        - "Huawei / 华为"
        - "OPPO"
        - "Vivo"
        - "LG"
        - "Sony / 索尼"
        - "Haier / 海尔"
        - "Hisense / 海信"
        - "TCL"
        - "Gree / 格力"
        - "Midea / 美的"
        - "Panasonic / 松下"
        - "Philips / 飞利浦"
        - "Sharp / 夏普"
        - "Lenovo / 联想"
        - "Honor / 荣耀"
        - "Roborock / 石头"
        - "Dreame / 追觅"
      product_categories:
        - "[手机]: phone, smartphone, foldable, mobile"
        - "[家电]: tv, television, refrigerator, washing machine, air conditioner, robot vacuum"
        - "[芯片]: chip, soc, processor, cpu, gpu, snapdragon, dimensity"
        - "[显示]: display, panel, oled, microled, miniled, qled"
      competition_context:
        - "launch / 发布"
        - "release / 上市"
        - "price / 价格"
        - "announce / 宣布"
    priority: 1
    note: "标题必须附加 [手机]/[家电]/[芯片]/[显示] 标签"

  2:
    name: "新技术 / 材料 — Emerging Tech, Materials & CMF"
    description: "半导体、显示、电池、材料、AI底层技术的研发与突破"
    required_any:
      semiconductor:
        - "semiconductor / 半导体"
        - "wafer / 晶圆"
        - "foundry / 代工"
        - "lithography / 光刻"
      display:
        - "MicroLED / 微型LED"
        - "MiniLED / 迷你LED"
        - "AMOLED"
        - "Quantum Dot / 量子点"
      battery:
        - "Solid State Battery / 固态电池"
        - "Energy Density / 能量密度"
        - "Silicon Anode / 硅负极"
      material:
        - "Graphene / 石墨烯"
        - "GaN / 氮化镓"
        - "SiC / 碳化硅"
        - "CMF"
        - "Perovskite / 钙钛矿"
      ai_core:
        - "NPU / 神经处理器"
        - "On-device AI / 端侧AI"
        - "Foundation Model / 大模型"
        - "Inference Engine / 推理引擎"
    exclude:
      - "品牌竞争内容（应归T1）"
      - "纯商业新闻（发布/价格/市场份额）"
    priority: 2

  3:
    name: "制造（SEA / India）— Manufacturing Expansion"
    description: "三星供应商/潜在供应商/竞品在东南亚或印度的建厂、扩产、投资"
    required:
      locations:
        - "Vietnam / 越南（北宁、河内、太原等）"
        - "Thailand / 泰国（曼谷等）"
        - "Indonesia / 印尼（雅加达等）"
        - "Malaysia / 马来西亚（槟城、吉隆坡等）"
        - "Singapore / 新加坡"
        - "Philippines / 菲律宾"
        - "India / 印度（诺伊达、班加罗尔、钦奈等）"
        - "Bangladesh / 孟加拉"
      manufacturing_keywords:
        - "factory / 工厂"
        - "plant / 产线"
        - "assembly / 组装"
        - "manufacturing / 制造"
        - "investment / 投资"
        - "expansion / 扩产"
        - "relocation / 迁移"
      relevance:
        - "三星供应商 / Samsung supplier"
        - "潜在供应商 / potential supplier"
        - "竞品建厂 / competitor factory"
    priority: 3

  4:
    name: "行业展会 — Industry Events"
    description: "与家电/手机相关的重要行业展会，需提供时间+地点+参展商信息"
    required:
      event_names:
        - "CES（Consumer Electronics Show）"
        - "IFA Berlin"
        - "MWC（Mobile World Congress）"
        - "Computex"
        - "AWE（中国家电博览会）"
        - "Display Week / SID"
        - "Gitex"
        - "Touch Taiwan"
        - "香港电子展"
        - "CES Asia"
      mandatory_fields:
        - "展会名称"
        - "时间（日期）"
        - "地点（城市/国家）"
        - "参展商名单链接（optional but preferred）"
    note: "缺少时间或地点信息时，在报告中标注警告"
    priority: 4

# 强制排除关键词（命中即丢弃）
exclude_keywords:
  - "hotel booking / 酒店预订"
  - "restaurant review / 餐厅评价"
  - "food delivery / 外卖"
  - "real estate / 房地产"
  - "bitcoin / 比特币"
  - "crypto / 加密货币"
  - "nft"
  - "sports score / 体育赛事"
  - "celebrity / 娱乐明星"
  - "clinical trial / 临床试验"
  - "drug recall / 药品召回"

# 三星业务强相关关键词（至少命中一个才保留）
samsung_relevance:
  brands:
    - "Samsung / 三星"
    - "Apple / 苹果"
    - "Xiaomi / 小米"
    - "Huawei / 华为"
    - "LG / Sony / TCL / Hisense"
  products:
    - "smartphone / 手机"
    - "foldable / 折叠屏"
    - "TV / 电视"
    - "OLED / QLED / MicroLED"
    - "semiconductor / 半导体"
    - "memory / 内存 / DRAM / NAND"
    - "display panel / 显示面板"
    - "home appliance / 家电"
  geo:
    - "Vietnam / 越南"
    - "Thailand / 泰国"
    - "India / 印度"

# 数据源可靠性评分
reliability:
  high:
    - "reuters.com"
    - "bloomberg.com"
    - "ft.com"
    - "nikkei.com"
    - "semiengineering.com"
    - "digitimes.com"
    - "trendforce.com"
    - "counterpointresearch.com"
  medium:
    - "techcrunch.com"
    - "theverge.com"
    - "gsmarena.com"
    - "oled-info.com"
    - "ithome.com"
    - "36kr.com"
    - "vietnam-briefing.com"
    - "ledinside.cn"
  low:
    - "aggregator sites (36kr evening roundup, etc.)"
    - "abnotebook.com"
    - "leikeji.com"
