name: Samsung CE Intelligence Report

on:
  schedule:
    # Runs at 01:30 UTC (09:30 Singapore Time)
    - cron: '30 1 * * *'
  workflow_dispatch:  # Manual trigger
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'config/**'

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Cache sentence-transformers model
        uses: actions/cache@v3
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-huggingface
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create data directory
        run: mkdir -p data output
      
      - name: Run Intelligence System
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
        run: |
          python src/main.py
      
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: samsung-intelligence-reports
          path: |
            output/*.html
            output/*.md
          retention-days: 30
      
      - name: Upload deduplication log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dedup-log
          path: data/history.db
          retention-days: 7
